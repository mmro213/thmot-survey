<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mobility Evidence Survey · Phase 0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#22282b;
  --paper:#f4f1ea;
  --paper2:#ece7db;
  --blue:#1c3d52;
  --blue2:#2f5a74;
  --teal:#4d8288;
  --orange:#e2632c;
  --line:#c9c2ae;
  --ok:#3f7a4e;
  --white:#fffdf8;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:'IBM Plex Mono',monospace;}
h1,h2,h3,.disp{font-family:'Space Grotesk',sans-serif;}
::selection{background:var(--orange);color:#fff;}
:focus-visible{outline:2px solid var(--orange);outline-offset:2px;}
button,select,input,textarea{font-family:inherit;}

/* ---------- shell ---------- */
.shell{max-width:640px;margin:0 auto;min-height:100vh;background:var(--white);border-left:1px solid var(--line);border-right:1px solid var(--line);}
header{background:var(--blue);color:var(--white);padding:18px 20px 14px;position:sticky;top:0;z-index:20;}
header .eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#a9c3cf;margin-bottom:4px;}
header h1{font-size:19px;margin:0 0 2px;font-weight:700;letter-spacing:-.01em;}
header .sub{font-size:11.5px;color:#c7d6dc;}
.modeToggle{display:flex;margin-top:14px;background:rgba(255,255,255,.08);border-radius:8px;padding:3px;gap:3px;}
.modeToggle button{flex:1;border:none;background:transparent;color:#cfe0e6;padding:8px 6px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;letter-spacing:.02em;}
.modeToggle button.active{background:var(--orange);color:#fff;}

main{padding:16px 18px 60px;}
.hint{font-size:11.5px;color:#6b6255;line-height:1.5;margin:0 0 16px;padding:10px 12px;background:var(--paper2);border-left:3px solid var(--teal);border-radius:2px;}

/* ---------- stepper ---------- */
.chain{display:flex;align-items:center;gap:0;margin:0 0 18px;}
.chain .node{flex:1;text-align:center;}
.chain .dot{width:26px;height:26px;border-radius:50%;border:2px solid var(--line);background:var(--white);color:var(--line);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;margin:0 auto 5px;transition:all .2s;}
.chain .dot.filled{background:var(--ok);border-color:var(--ok);color:#fff;}
.chain .lbl{font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;color:#8a8171;}
.chain .bar{position:relative;top:-16px;height:2px;background:var(--line);flex:0 0 auto;width:14%;}
.chain .bar.filled{background:var(--ok);}

/* ---------- sections ---------- */
.card{border:1px solid var(--line);border-radius:6px;margin-bottom:14px;overflow:hidden;}
.card .head{background:var(--paper2);padding:9px 13px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--blue);display:flex;align-items:center;gap:7px;}
.card .head .n{width:18px;height:18px;border-radius:4px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;}
.card .body{padding:13px;}
.field{margin-bottom:12px;}
.field:last-child{margin-bottom:0;}
label{display:block;font-size:11.5px;color:#524a3e;margin-bottom:5px;font-weight:600;}
.unit{color:#9a917f;font-weight:400;}
input[type=text],input[type=number],select,textarea{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:5px;background:var(--white);font-size:14px;color:var(--ink);}
textarea{resize:vertical;min-height:54px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.chk{display:flex;align-items:flex-start;gap:8px;padding:6px 0;font-size:13px;border-bottom:1px dashed #e3ddcd;cursor:pointer;}
.chk:last-child{border-bottom:none;}
.chk input{margin-top:3px;accent-color:var(--orange);}
.pillrow{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px;}
.pill{border:1px solid var(--line);background:var(--white);border-radius:20px;padding:5px 11px;font-size:11.5px;cursor:pointer;color:#5c5646;}
.pill.sel{background:var(--orange);color:#fff;border-color:var(--orange);}

.btnRow{display:flex;gap:10px;margin-top:6px;}
.btn{flex:1;padding:13px;border-radius:6px;border:none;font-weight:700;font-size:13.5px;cursor:pointer;letter-spacing:.02em;}
.btn.primary{background:var(--orange);color:#fff;}
.btn.ghost{background:transparent;border:1px solid var(--line);color:#5c5646;}
.btn.wide{width:100%;}
.btn:disabled{opacity:.4;cursor:not-allowed;}

.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--blue);color:#fff;padding:11px 18px;border-radius:7px;font-size:13px;box-shadow:0 6px 20px rgba(0,0,0,.2);z-index:99;opacity:0;pointer-events:none;transition:opacity .25s, transform .25s;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px);}

/* ---------- supervisor ---------- */
.gate{padding:60px 20px;text-align:center;}
.gate input{max-width:200px;margin:14px auto;text-align:center;letter-spacing:.2em;}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.stat{border:1px solid var(--line);border-radius:6px;padding:12px;background:var(--paper2);}
.stat .num{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;color:var(--blue);}
.stat .lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:#7a715f;}
.barchart .brow{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:11.5px;}
.barchart .bname{width:118px;flex-shrink:0;color:#5c5646;}
.barchart .btrack{flex:1;height:14px;background:var(--paper2);border-radius:3px;overflow:hidden;}
.barchart .bfill{height:100%;background:var(--teal);}
.barchart .bnum{width:26px;text-align:right;color:#8a8171;}

.filterRow{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.filterRow select{width:auto;flex:1;font-size:12px;padding:7px 8px;}
.reclist{display:flex;flex-direction:column;gap:8px;}
.rec{border:1px solid var(--line);border-radius:6px;padding:10px 12px;font-size:12px;}
.rec .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.rec .mod{font-weight:700;color:var(--blue);}
.rec .flag{font-size:10px;background:#f6d9c9;color:#a24817;padding:2px 7px;border-radius:10px;font-weight:700;}
.rec .flag.ok{background:#d7ead9;color:#2c5c37;}
.rec .meta{color:#8a8171;font-size:11px;}

section.hidden{display:none;}
</style>
</head>
<body>
<div class="shell">
  <header>
    <div class="eyebrow">Phase 0 · Field Evidence</div>
    <h1>Mobility Evidence Survey</h1>
    <div class="sub">Every question feeds one of: Problem → Cause → Solution → Metric</div>
    <div class="modeToggle">
      <button id="tabField" class="active">Field entry</button>
      <button id="tabSup">Supervisor</button>
    </div>
  </header>
  <main id="main"></main>
</div>
<div class="toast" id="toast"></div>

<script>
/* ================= CONFIG ================= */
const MODULES = {
  junction:{ label:"Junction / Signal",
    problem:[
      {id:"delay",label:"Average vehicle delay",unit:"sec/veh",type:"number"},
      {id:"queue",label:"Max queue length observed",unit:"m",type:"number"},
      {id:"incidents",label:"Recorded incidents/near-miss (30d)",unit:"count",type:"number"}],
    causes:["Signal timing / phasing","Illegal parking blocking lane","Pedestrian crossing conflict","Road geometry constraint","Loading/unloading activity","Bus stop too close to junction","Flooding / drainage"],
    solutions:["Signal re-timing / coordination","Additional turn lane","Parking enforcement","Crossing redesign","Geometric redesign","Relocate nearby bus stop","Enforcement camera"],
    metricHint:"e.g. −20% avg delay, −15m queue length" },
  bus:{ label:"Bus Stop / Route",
    problem:[
      {id:"dwell",label:"Average dwell time",unit:"sec",type:"number"},
      {id:"otp",label:"On-time performance",unit:"%",type:"number"},
      {id:"bunch",label:"Bunching events observed (peak hr)",unit:"count",type:"number"}],
    causes:["Poor stop location / access","No bus priority lane","Illegal parking at stop","Signal conflict on approach","Insufficient shelter/capacity","Overlapping/duplicate routes"],
    solutions:["Relocate stop","Bus priority lane or signal","Enforcement at stop","Shelter/capacity upgrade","Route rationalisation"],
    metricHint:"e.g. +10% on-time performance, −20s dwell" },
  ped:{ label:"Pedestrian / Crossing",
    problem:[
      {id:"unsafe",label:"Unsafe/illegal crossings observed (1hr)",unit:"count",type:"number"},
      {id:"crosstime",label:"Effective crossing time available",unit:"sec",type:"number"},
      {id:"volume",label:"Pedestrian volume vs facility capacity",unit:"ratio",type:"text"}],
    causes:["No / inadequate crossing facility","Crossing distance too long","Poor visibility / lighting","Vehicle movement given priority","No dedicated pedestrian signal phase"],
    solutions:["New or upgraded crossing","Add pedestrian signal phase","Refuge island","Footbridge / underpass","Lighting improvement"],
    metricHint:"e.g. −30% unsafe crossings, +8s ped phase" },
  curb:{ label:"Parking / Loading / Curbside",
    problem:[
      {id:"illegal",label:"Illegally parked vehicles observed",unit:"count",type:"number"},
      {id:"loadtime",label:"Avg loading/unloading duration",unit:"min",type:"number"},
      {id:"occupancy",label:"Curb occupancy rate",unit:"%",type:"number"}],
    causes:["No designated loading zone","Weak / no enforcement","Demand exceeds curb supply","Peak-hour conflict with traffic"],
    solutions:["Designated loading bay","Enforcement / CCTV at curb","Time-based restriction","Off-street loading facility"],
    metricHint:"e.g. +25% curb compliance rate" },
  flood:{ label:"Drainage / Flood",
    problem:[
      {id:"depth",label:"Max flood depth observed",unit:"cm",type:"number"},
      {id:"duration",label:"Flood duration",unit:"min",type:"number"},
      {id:"closure",label:"Road closure / disruption time",unit:"hr",type:"number"}],
    causes:["Insufficient drain capacity","Blocked / silted drainage","Low elevation or geometry","Pump station failure","Debris / waste blockage"],
    solutions:["Drain capacity upgrade","Pump installation","Clearing / maintenance program","Road elevation adjustment","Early warning / sensor system"],
    metricHint:"e.g. −40 min recovery time, −15cm peak depth" },
  asset:{ label:"Road Geometry / Asset",
    problem:[
      {id:"condition",label:"Pavement/asset condition rating",unit:"1-5",type:"number"},
      {id:"complaints",label:"Public complaints logged (90d)",unit:"count",type:"number"}],
    causes:["Poor original design","Deterioration / lack of maintenance","Physical obstruction","Inadequate signage or markings"],
    solutions:["Repaving / resurfacing","Geometric redesign","Obstruction removal","Signage & marking renewal"],
    metricHint:"e.g. condition index 2→4, −30% complaints" },
  cctv:{ label:"CCTV / Monitoring / Response",
    problem:[
      {id:"coverage",label:"Estimated camera coverage",unit:"%",type:"number"},
      {id:"detect",label:"Incident detection time",unit:"min",type:"number"},
      {id:"blind",label:"Blind spots identified",unit:"count",type:"number"}],
    causes:["No camera coverage","Poor angle / maintenance","No integration with control centre","Monitoring staffing gap"],
    solutions:["New CCTV installation","Camera relocation / upgrade","Integrate to command centre","Add monitoring staff/shift"],
    metricHint:"e.g. coverage 60%→90%, −5min detection time" }
};
const MODULE_KEYS = Object.keys(MODULES);
const CONDITIONS = ["Clear","Rain","Post-flood","Peak hour","Off-peak","Night","Event/closure"];
const TIMEFRAMES = ["3 months","6 months","12 months","Post-Phase 1"];
const PASSCODE = "MOTJun2026";

/* ================= BACKEND: Google Sheets via Apps Script ================= */
// 1. Deploy the companion Apps Script as a Web App (see setup guide).
// 2. Paste the resulting /exec URL below.
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzddYq5I-HvVv1cYjpjOOtsEjLBgwo5P2o6H41FQ00P2QLJg0eU8jkFNUATXf_TUHfRvQ/exec";

async function apiGet(action){
  const res = await fetch(APPS_SCRIPT_URL + "?action=" + action);
  if(!res.ok) throw new Error("network");
  return res.json();
}
async function apiPost(payload){
  const res = await fetch(APPS_SCRIPT_URL, {
    method:"POST",
    headers:{"Content-Type":"text/plain;charset=utf-8"}, // avoids CORS preflight on Apps Script
    body: JSON.stringify(payload)
  });
  if(!res.ok) throw new Error("network");
  return res.json();
}

async function loadEntries(){
  try{
    const data = await apiGet("entries");
    return (data.entries||[]).sort((a,b)=> b.ts - a.ts);
  }catch(e){ toast("Couldn't reach the sheet — check connection"); return []; }
}
async function saveEntry(rec){
  await apiPost({ type:"entry", record: rec });
}
async function loadCorridors(){
  try{
    const data = await apiGet("sites");
    return (data.sites && data.sites.length) ? data.sites : ["Site A"];
  }catch(e){ toast("Couldn't reach the sheet — showing local list only"); return ["Site A"]; }
}
async function addCorridor(name){
  await apiPost({ type:"site", name: name });
}

/* ================= APP STATE ================= */
let state = { corridor:"", newSiteMode:false, module:"", location:"", surveyor:"", condition:"Clear",
  lat:"", lng:"", problem:{}, causes:[], causeOther:"", solutions:[], solutionNote:"",
  baseline:"", target:"", unit:"", timeframe:"3 months" };

function resetForm(keepSurveyor){
  const s = keepSurveyor? state.surveyor : "";
  state = { corridor:state.corridor, newSiteMode:false, module:"", location:"", surveyor:s, condition:"Clear",
    lat:"", lng:"", problem:{}, causes:[], causeOther:"", solutions:[], solutionNote:"",
    baseline:"", target:"", unit:"", timeframe:"3 months" };
}

function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2200);
}

function chainFill(){
  const p = state.module && Object.values(state.problem).some(v=>v!=="" && v!=null);
  const c = state.causes.length>0 || state.causeOther.trim()!=="";
  const so = state.solutions.length>0 || state.solutionNote.trim()!=="";
  const m = state.baseline!=="" && state.target!=="";
  return {p,c,so,m};
}

/* ================= RENDER: FIELD MODE ================= */
let corridorsCache = [];

async function renderField(){
  corridorsCache = await loadCorridors();
  if(state.corridor && !corridorsCache.includes(state.corridor)){
    corridorsCache.push(state.corridor); // e.g. just-added site whose sheet write hasn't been read back yet
  }
  if(!state.corridor && corridorsCache.length){
    state.corridor = corridorsCache[0];
  }
  const main = document.getElementById("main");
  const mod = MODULES[state.module];
  const fill = chainFill();

  main.innerHTML = `
    <div class="hint">Pick the site, choose what you're observing, then fill Problem → Cause → Solution → Target. A record only strengthens the case to OTP/MOT once all four are answered.</div>

    <div class="card">
      <div class="head"><span class="n">0</span>Site &amp; context</div>
      <div class="body">
        <div class="field">
          <label>Corridor / site</label>
          <select id="corridorSel">
            ${corridorsCache.map(c=>`<option value="${esc(c)}" ${c===state.corridor?"selected":""}>${esc(c)}</option>`).join("")}
            <option value="__new__">+ Add new site…</option>
          </select>
        </div>
        <div class="field">
          <label>Observation point (landmark, chainage, stop name…)</label>
          <input type="text" id="locInput" value="${esc(state.location)}" placeholder="e.g. Junction of Rd X / Soi Y">
        </div>
        <div class="row2">
          <div class="field">
            <label>Surveyor</label>
            <input type="text" id="surveyorInput" value="${esc(state.surveyor)}" placeholder="Name">
          </div>
          <div class="field">
            <label>Condition</label>
            <select id="condSel">${CONDITIONS.map(c=>`<option ${c===state.condition?"selected":""}>${c}</option>`).join("")}</select>
          </div>
        </div>
        <div class="row2">
          <div class="field"><label>Lat <span class="unit">(optional)</span></label><input type="text" id="latInput" value="${esc(state.lat)}"></div>
          <div class="field"><label>Lng <span class="unit">(optional)</span></label><input type="text" id="lngInput" value="${esc(state.lng)}"></div>
        </div>
        <button type="button" class="btn ghost wide" id="gpsBtn" style="margin-bottom:14px;">📍 Use my current location</button>
        <div class="field">
          <label>What are you observing?</label>
          <div class="pillrow">
            ${MODULE_KEYS.map(k=>`<div class="pill ${state.module===k?"sel":""}" data-mod="${k}">${MODULES[k].label}</div>`).join("")}
          </div>
        </div>
      </div>
    </div>

    ${mod? `
    <div class="chain">
      ${chainNode("1","Problem",fill.p)}${chainBar(fill.p)}
      ${chainNode("2","Cause",fill.c)}${chainBar(fill.c)}
      ${chainNode("3","Solution",fill.so)}${chainBar(fill.so)}
      ${chainNode("4","Metric",fill.m)}
    </div>

    <div class="card">
      <div class="head"><span class="n">1</span>Problem — objective measurement</div>
      <div class="body">
        ${mod.problem.map(f=>`
          <div class="field">
            <label>${f.label} <span class="unit">(${f.unit})</span></label>
            <input type="${f.type}" data-pf="${f.id}" value="${esc(state.problem[f.id]||"")}">
          </div>`).join("")}
      </div>
    </div>

    <div class="card">
      <div class="head"><span class="n">2</span>Cause — why does it exist?</div>
      <div class="body">
        ${mod.causes.map(c=>`
          <label class="chk"><input type="checkbox" data-cause="${esc(c)}" ${state.causes.includes(c)?"checked":""}> ${c}</label>
        `).join("")}
        <div class="field" style="margin-top:10px;">
          <label>Other root cause</label>
          <input type="text" id="causeOther" value="${esc(state.causeOther)}" placeholder="If not listed above">
        </div>
      </div>
    </div>

    <div class="card">
      <div class="head"><span class="n">3</span>Solution — recommended intervention</div>
      <div class="body">
        ${mod.solutions.map(s=>`
          <label class="chk"><input type="checkbox" data-sol="${esc(s)}" ${state.solutions.includes(s)?"checked":""}> ${s}</label>
        `).join("")}
        <div class="field" style="margin-top:10px;">
          <label>Notes</label>
          <textarea id="solNote" placeholder="Practical constraints, sequencing, dependencies…">${esc(state.solutionNote)}</textarea>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="head"><span class="n">4</span>Metric — how we'll prove success</div>
      <div class="body">
        <div class="row2">
          <div class="field"><label>Baseline value</label><input type="text" id="baseline" value="${esc(state.baseline)}" placeholder="current"></div>
          <div class="field"><label>Target value</label><input type="text" id="target" value="${esc(state.target)}" placeholder="goal"></div>
        </div>
        <div class="row2">
          <div class="field"><label>Unit</label><input type="text" id="unit" value="${esc(state.unit)}" placeholder="${esc(mod.metricHint)}"></div>
          <div class="field"><label>Timeframe</label><select id="timeframe">${TIMEFRAMES.map(t=>`<option ${t===state.timeframe?"selected":""}>${t}</option>`).join("")}</select></div>
        </div>
      </div>
    </div>

    <div class="btnRow">
      <button class="btn ghost" id="clearBtn">Clear</button>
      <button class="btn primary" id="submitBtn" ${(!state.corridor||!state.location||!state.surveyor)?"disabled":""}>Save record</button>
    </div>
    `:""}
  `;
  wireField();
}

function chainNode(n,label,filled){
  return `<div class="node"><div class="dot ${filled?"filled":""}">${filled?"✓":n}</div><div class="lbl">${label}</div></div>`;
}
function chainBar(filled){ return `<div class="bar ${filled?"filled":""}"></div>`; }
function esc(s){ return (s+"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }

function wireField(){
  const $=id=>document.getElementById(id);
  $("corridorSel").onchange = async e=>{
    if(e.target.value==="__new__"){
      const name = (prompt("New site / corridor name:")||"").trim();
      if(name){
        state.corridor = name;
        if(!corridorsCache.includes(name)) corridorsCache = [...corridorsCache, name];
        renderField(); // re-render immediately with the optimistic list, don't wait on the network
        try{ await addCorridor(name); } // sync to the sheet in the background
        catch(err){ toast("Saved locally, but couldn't sync new site to the sheet"); }
      } else {
        renderField(); // user cancelled the prompt — re-render so the select falls back to a real site
      }
    } else { state.corridor = e.target.value; refreshChainOnly(); }
  };
  $("locInput").oninput = e=>{ state.location = e.target.value; refreshChainOnly(); };
  $("surveyorInput").oninput = e=>{ state.surveyor = e.target.value; refreshChainOnly(); };
  $("condSel").onchange = e=> state.condition = e.target.value;
  $("latInput").oninput = e=> state.lat = e.target.value;
  $("lngInput").oninput = e=> state.lng = e.target.value;
  const gpsBtn = $("gpsBtn");
  if(gpsBtn) gpsBtn.onclick = ()=>{
    if(!navigator.geolocation){ toast("Geolocation not supported on this device"); return; }
    gpsBtn.textContent = "Detecting…"; gpsBtn.disabled = true;
    navigator.geolocation.getCurrentPosition(
      pos=>{
        state.lat = pos.coords.latitude.toFixed(6);
        state.lng = pos.coords.longitude.toFixed(6);
        $("latInput").value = state.lat;
        $("lngInput").value = state.lng;
        gpsBtn.textContent = "📍 Use my current location"; gpsBtn.disabled = false;
        toast("Location detected");
      },
      err=>{
        gpsBtn.textContent = "📍 Use my current location"; gpsBtn.disabled = false;
        toast(err.code===1 ? "Location permission denied" : "Couldn't get location");
      },
      { enableHighAccuracy:true, timeout:10000 }
    );
  };
  document.querySelectorAll("[data-mod]").forEach(p=> p.onclick = ()=>{
    const same = state.module===p.dataset.mod;
    const surv=state.surveyor, corr=state.corridor, loc=state.location, cond=state.condition, lat=state.lat, lng=state.lng;
    resetForm(true);
    state.surveyor=surv; state.corridor=corr; state.location=loc; state.condition=cond; state.lat=lat; state.lng=lng;
    state.module = same? "" : p.dataset.mod;
    renderField();
  });
  document.querySelectorAll("[data-pf]").forEach(i=> i.oninput = e=>{ state.problem[e.target.dataset.pf]=e.target.value; refreshChainOnly(); });
  document.querySelectorAll("[data-cause]").forEach(i=> i.onchange = e=>{
    const v=e.target.dataset.cause;
    if(e.target.checked) state.causes.push(v); else state.causes=state.causes.filter(x=>x!==v);
    refreshChainOnly();
  });
  const co = $("causeOther"); if(co) co.oninput = e=>{ state.causeOther=e.target.value; refreshChainOnly(); };
  document.querySelectorAll("[data-sol]").forEach(i=> i.onchange = e=>{
    const v=e.target.dataset.sol;
    if(e.target.checked) state.solutions.push(v); else state.solutions=state.solutions.filter(x=>x!==v);
    refreshChainOnly();
  });
  const sn=$("solNote"); if(sn) sn.oninput = e=>{ state.solutionNote=e.target.value; };
  const bl=$("baseline"); if(bl) bl.oninput = e=>{ state.baseline=e.target.value; refreshChainOnly(); };
  const tg=$("target"); if(tg) tg.oninput = e=>{ state.target=e.target.value; refreshChainOnly(); };
  const un=$("unit"); if(un) un.oninput = e=>{ state.unit=e.target.value; };
  const tf=$("timeframe"); if(tf) tf.onchange = e=>{ state.timeframe=e.target.value; };

  const clearBtn = $("clearBtn"); if(clearBtn) clearBtn.onclick = ()=>{ resetForm(true); renderField(); };
  const submitBtn = $("submitBtn");
  if(submitBtn) submitBtn.onclick = async ()=>{
    submitBtn.disabled=true; submitBtn.textContent="Saving…";
    const fill = chainFill();
    const rec = {
      ts: Date.now(), corridor: state.corridor, module: state.module, moduleLabel: MODULES[state.module].label,
      location: state.location, surveyor: state.surveyor, condition: state.condition, lat: state.lat, lng: state.lng,
      problem: {...state.problem}, causes:[...state.causes], causeOther: state.causeOther,
      solutions:[...state.solutions], solutionNote: state.solutionNote,
      baseline: state.baseline, target: state.target, unit: state.unit, timeframe: state.timeframe,
      complete: fill.p && fill.c && fill.so && fill.m
    };
    try{
      await saveEntry(rec);
      toast(rec.complete? "Saved — full evidence chain ✓" : "Saved — evidence chain incomplete");
      resetForm(true);
      renderField();
    }catch(e){
      toast("Save failed — check connection");
      submitBtn.disabled=false; submitBtn.textContent="Save record";
    }
  };
}
function refreshChainOnly(){
  const fill = chainFill();
  const dots = document.querySelectorAll(".chain .dot");
  const bars = document.querySelectorAll(".chain .bar");
  if(dots.length){
    const vals=[fill.p,fill.c,fill.so,fill.m];
    dots.forEach((d,i)=>{ d.classList.toggle("filled", vals[i]); d.textContent = vals[i]? "✓" : (i+1); });
    bars.forEach((b,i)=> b.classList.toggle("filled", vals[i]));
  }
  const submitBtn=document.getElementById("submitBtn");
  if(submitBtn) submitBtn.disabled = !(state.corridor && state.location && state.surveyor);
}

/* ================= RENDER: SUPERVISOR MODE ================= */
let supAuthed = false;
async function renderSupervisor(){
  const main = document.getElementById("main");
  if(!supAuthed){
    main.innerHTML = `
      <div class="gate">
        <div class="disp" style="font-size:16px;font-weight:700;color:var(--blue);margin-bottom:6px;">Supervisor access</div>
        <div style="font-size:12px;color:#8a8171;">Enter the review passcode</div>
        <input type="text" id="pass" placeholder="passcode">
        <div><button class="btn primary" id="enterBtn" style="padding:10px 22px;">Enter</button></div>
      </div>`;
    document.getElementById("enterBtn").onclick = ()=>{
      if(document.getElementById("pass").value === PASSCODE){ supAuthed=true; renderSupervisor(); }
      else toast("Incorrect passcode");
    };
    return;
  }
  const entries = await loadEntries();
  const total = entries.length;
  const complete = entries.filter(e=>e.complete).length;
  const pct = total? Math.round(complete/total*100):0;

  const byModule = {}; MODULE_KEYS.forEach(k=>byModule[k]=0);
  entries.forEach(e=> byModule[e.module] = (byModule[e.module]||0)+1);
  const maxMod = Math.max(1,...Object.values(byModule));

  const byCorridor = {};
  entries.forEach(e=> byCorridor[e.corridor] = (byCorridor[e.corridor]||0)+1);
  const maxCorr = Math.max(1,...Object.values(byCorridor));

  const corridors = await loadCorridors();

  main.innerHTML = `
    <div class="stats">
      <div class="stat"><div class="num">${total}</div><div class="lbl">Total records</div></div>
      <div class="stat"><div class="num">${pct}%</div><div class="lbl">Full evidence chains</div></div>
    </div>

    <div class="card"><div class="head">By observation type</div><div class="body barchart">
      ${MODULE_KEYS.map(k=>`<div class="brow"><div class="bname">${MODULES[k].label}</div><div class="btrack"><div class="bfill" style="width:${byModule[k]/maxMod*100}%"></div></div><div class="bnum">${byModule[k]}</div></div>`).join("")}
    </div></div>

    <div class="card"><div class="head">By corridor / site</div><div class="body barchart">
      ${Object.keys(byCorridor).length? Object.entries(byCorridor).map(([c,n])=>`<div class="brow"><div class="bname">${esc(c)}</div><div class="btrack"><div class="bfill" style="width:${n/maxCorr*100}%;background:var(--orange);"></div></div><div class="bnum">${n}</div></div>`).join("") : "<div style='font-size:12px;color:#8a8171;'>No records yet.</div>"}
    </div></div>

    <div class="card">
      <div class="head">Records <span style="margin-left:auto;font-weight:400;text-transform:none;letter-spacing:0;">${entries.length}</span></div>
      <div class="body">
        <div class="filterRow">
          <select id="fMod"><option value="">All types</option>${MODULE_KEYS.map(k=>`<option value="${k}">${MODULES[k].label}</option>`).join("")}</select>
          <select id="fCorr"><option value="">All sites</option>${corridors.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join("")}</select>
          <select id="fFlag"><option value="">All</option><option value="incomplete">Incomplete only</option><option value="complete">Complete only</option></select>
        </div>
        <div class="reclist" id="recList"></div>
      </div>
    </div>
    <div class="btnRow"><button class="btn primary wide" id="exportBtn">Export CSV</button></div>
  `;

  function draw(){
    const fm=document.getElementById("fMod").value, fc=document.getElementById("fCorr").value, ff=document.getElementById("fFlag").value;
    let list = entries.filter(e=>
      (!fm || e.module===fm) && (!fc || e.corridor===fc) &&
      (!ff || (ff==="complete"? e.complete : !e.complete))
    );
    document.getElementById("recList").innerHTML = list.length? list.map(e=>`
      <div class="rec">
        <div class="top"><span class="mod">${e.moduleLabel}</span><span class="flag ${e.complete?"ok":""}">${e.complete?"Complete":"Incomplete"}</span></div>
        <div class="meta">${esc(e.corridor)} · ${esc(e.location)} · ${new Date(e.ts).toLocaleString()} · ${esc(e.surveyor)}</div>
      </div>`).join("") : "<div style='font-size:12px;color:#8a8171;'>No matching records.</div>";
  }
  draw();
  ["fMod","fCorr","fFlag"].forEach(id=> document.getElementById(id).onchange = draw);

  document.getElementById("exportBtn").onclick = ()=>{
    const cols = ["ts","corridor","module","location","surveyor","condition","lat","lng","problem","causes","causeOther","solutions","solutionNote","baseline","target","unit","timeframe","complete"];
    const rows = [cols.join(",")];
    entries.forEach(e=>{
      const row = cols.map(c=>{
        let v = e[c];
        if(c==="problem") v = JSON.stringify(e.problem);
        if(c==="causes"||c==="solutions") v = (e[c]||[]).join(" | ");
        if(c==="ts") v = new Date(e.ts).toISOString();
        v = (v===undefined||v===null)? "" : String(v);
        return '"'+v.replace(/"/g,'""')+'"';
      });
      rows.push(row.join(","));
    });
    const blob = new Blob([rows.join("\n")], {type:"text/csv"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href=url; a.download="phase0_evidence_"+Date.now()+".csv"; a.click();
    URL.revokeObjectURL(url);
  };
}
